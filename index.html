<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + Daisyui Css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <section class="bg-gray-100 min-h-screen flex items-center justify-center">
        <div class="w-80 mx-auto static bg-[#FFFFFF] rounded-box border border-base-300 py-6">
            <div class="items-center  justify-center">
                <img class="mx-auto mb-4" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
                <p class="text-[#64748B] text-center">Sign in manage your issue</p>
            </div>
            <fieldset class="fieldset rounded-box w-full p-4">
                <label class="label">Username</label>
                <input type="text" class="input" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>

                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>

                <button class="btn btn-neutral bg-[#4A00FF] mt-4">Sign In</button>
            </fieldset>
            <div class="flex items-center gap-3 mb-2">
                <hr class="flex-1 border-gray-300">
                <p class="text-gray-500">OR</p>
                <hr class="flex-1 border-gray-300">
            </div>
            <div>
                <p class="text-[#64748B] text-[14px] text-center mb-6">Demo Credentials:</p>
                <p class="text-[#1F2937] text-center"><span class="font-bold">Username:</span> admin <br><span
                        class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </section>


</body>

</html>
