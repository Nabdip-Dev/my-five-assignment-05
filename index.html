<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + Daisyui Css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <section class="bg-gray-100 hidden min-h-screen flex items-center justify-center">
        <div class="w-80 mx-auto static bg-[#FFFFFF] rounded-box border border-base-300 py-6">
            <div class="items-center  justify-center">
                <img class="mx-auto mb-4" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
                <p class="text-[#64748B] text-center">Sign in manage your issue</p>
            </div>
            <fieldset class="fieldset rounded-box w-full p-4">
                <label class="label">Username</label>
                <input type="text" class="input" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>

                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>

                <button class="btn btn-neutral bg-[#4A00FF] mt-4">Sign In</button>
            </fieldset>
            <div class="flex items-center gap-3 mb-2">
                <hr class="flex-1 border-gray-300">
                <p class="text-gray-500">OR</p>
                <hr class="flex-1 border-gray-300">
            </div>
            <div>
                <p class="text-[#64748B] text-[14px] text-center mb-6">Demo Credentials:</p>
                <p class="text-[#1F2937] text-center"><span class="font-bold">Username:</span> admin <br><span
                        class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </section>

    <section class="min-h-screen bg-gray-100">
        <!-- navber -->
        <header class="bg-white">
            <nav class="w-full mx-auto flex items-center justify-between px-14 py-2">
                <div class="flex items-center gap-1">
                    <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                    <h2 class="text-1xl font-bold">GitHub Issues Tracker</h2>
                </div>
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                            <!-- <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </g>
                            </svg> -->
                            <i class="fa-brands fa-sistrix"></i>
                            <input type="search" placeholder="Search issues.." required />
                        </label>
                        <div class="validator-hint hidden">Enter valid Name</div>
                    </div>
                    <button class="btn btn-neutral bg-[#4A00FF] join-item">+ New Issue</button>
                </div>
            </nav>
        </header>

        <div class="w-11/12 mx-auto ">

            <!-- button header -->
            <div id="tab-btn" class="flex mx-auto gap-4 bg-white rounded mt-8 px-4 py-3">
                <button onclick="loadCardByStatus('all')" class="btn bg-[#4A00FF] text-white px-8">All</button>
                <button onclick="loadCardByStatus('open')" class="btn bg-green-500 text-white px-8">Open</button>
                <button onclick="loadCardByStatus('closed')" class="btn bg-red-500 text-white px-8">Closed</button>
            </div>

            <!-- main section -->
            <div>

                <!-- count header -->
                <div class="flex mx-auto justify-between bg-white rounded mt-4 px-4 py-3">

                    <!-- left count -->
                    <div class="flex gap-4 flex-1">
                        <img src="./assets/Aperture.png" alt="">
                        <div>
                            <h1 id="issue-count">50 Issues</h1>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>

                    <!-- right stutas -->
                    <div class="flex flex-1 gap-4 justify-end items-center">
                        <div class="flex gap-1">
                            <img src="./assets/Open-Status.png" alt="">
                            <p>Open</p>
                        </div>
                        <div class="flex gap-1">
                            <img src="./assets/Closed- Status .png" alt="">
                            <p>Closed</p>
                        </div>
                    </div>
                </div>

                <!-- card-contanir -->
                <div id="card-container" class="bg-white grid grid-cols-3 gap-6 p-4">

                    <!-- <div class="max-w-sm bg-white rounded-xl shadow-md overflow-hidden border-t-4 border-green-500">

                            <p>1/15/2024</p>
                        </div>

                    </div> -->

                </div>
            </div>
        </div>
    </section>
    <script src="./script/index.js"></script>
</body>

</html>
